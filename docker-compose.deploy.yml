name: docflow-ai

# Versión "SOLO EJECUTAR": usa imágenes ya publicadas en el registro (no necesita el código fuente).
# Para una persona que solo quiere hacerlo funcionar:
#   1) instala Docker
#   2) descarga este fichero y crea un .env con GROQ_API_KEY y MSSQL_SA_PASSWORD
#   3) docker compose -f docker-compose.deploy.yml up -d
#   4) abre http://localhost:8080
services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-DocFlow_Dev123!}"
    volumes:
      - docflow-db:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  api:
    image: ghcr.io/eric270992/docflow-ai-api:latest
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      Database__Proveedor: "SqlServer"
      ConnectionStrings__SqlServer: "Server=db,1433;Database=DocFlowAI;User Id=sa;Password=${MSSQL_SA_PASSWORD:-DocFlow_Dev123!};TrustServerCertificate=True;"
      Database__MigrateOnStartup: "true"
      # Proveedor LLM: "Groq" (nube, por defecto), "Nvidia" (nube, límite por petición no por token)
      # o "Local" (LM Studio/Ollama). Se elige en el .env.
      Llm__Proveedor: "${LLM_PROVIDER:-Groq}"
      # Vacía por defecto: si usas otro proveedor no necesitas clave de Groq (no da aviso al arrancar).
      Llm__Perfiles__Groq__ApiKey: "${GROQ_API_KEY:-}"
      # Groq deprecia modelos con cierta frecuencia (ver https://console.groq.com/docs/deprecations).
      # Si el modelo por defecto deja de existir, sobreescribe GROQ_MODEL en el .env sin esperar una imagen nueva.
      Llm__Perfiles__Groq__Model: "${GROQ_MODEL:-qwen/qwen3.6-27b}"
      # Nvidia build.nvidia.com: gratis sin tarjeta, límite de 40 peticiones/minuto (no por token como
      # Groq) — mejor opción si las imágenes de las facturas son grandes. Clave en build.nvidia.com.
      # OJO: el Free Endpoint solo admite 1 imagen por petición (vale para facturas de 1 página).
      Llm__Perfiles__Nvidia__ApiKey: "${NVIDIA_API_KEY:-}"
      Llm__Perfiles__Nvidia__Model: "${NVIDIA_MODEL:-nvidia/llama-3.1-nemotron-nano-vl-8b-v1}"
      # Para Local: URL del servidor. Si corre en el mismo PC que Docker, usa host.docker.internal.
      Llm__Perfiles__Local__BaseUrl: "${LLM_LOCAL_BASEURL:-http://host.docker.internal:1234/v1}"
      Llm__Perfiles__Local__Model: "${LLM_LOCAL_MODEL:-qwen/qwen2.5-vl-7b}"
      Storage__BasePath: "/data/documentos"
    extra_hosts:
      - "host.docker.internal:host-gateway"   # permite alcanzar un LLM local en el host (Linux)
    ports:
      - "5255:8080"
    volumes:
      - docflow-files:/data/documentos
    depends_on:
      db:
        condition: service_healthy

  web:
    image: ghcr.io/eric270992/docflow-ai-web:latest
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  docflow-db:
  docflow-files:
